# phage_analysis — tek conda ortamı
# Hedef: Python 3.9 (tüm araçlar için en uyumlu ortak sürüm)
#
# Kurulum:
#   conda env create -f environment.yml
#   conda activate phage_analysis
#
# Bilinen sürüm notları:
#   - bacphlip 0.9.6: modelleri sklearn 0.23 ile eğitildi; sklearn >=1.0 ile
#     çalışır ancak "InconsistentVersionWarning" uyarısı verebilir.
#   - vHULK: tensorflow 2.9 (Python 3.9 uyumlu) gerektirir.
#   - VirSorter2: bioconda'dan yüklenir; DB için ayrıca
#     "virsorter setup -d <db_dir> -j <threads>" çalıştırılmalıdır.
#   - Nextflow: Java 17 bu ortamdan gelir; sistem Java'sı 11 ise
#     JAVA_HOME ve JAVA_CMD bu ortamın bin dizinine yönlendirilmelidir.

name: phage_analysis

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # ── Python ───────────────────────────────────────────────────────────────────
  - python=3.9

  # ── Java + Nextflow ───────────────────────────────────────────────────────────
  - openjdk=17
  - nextflow>=23.04.0

  # ── Kalite kontrol ve kırpma ──────────────────────────────────────────────────
  - fastqc=0.12.1
  - fastp>=0.23
  - multiqc>=1.21

  # ── Taksonomik sınıflandırma ──────────────────────────────────────────────────
  - kraken2=2.1.3

  # ── Montaj ───────────────────────────────────────────────────────────────────
  - spades>=4.0

  # ── Viral sekans tespiti ──────────────────────────────────────────────────────
  - virsorter2=2.2.4

  # ── Genom kalitesi ────────────────────────────────────────────────────────────
  - checkv=1.0.1

  # ── Yaşam döngüsü tahmini ────────────────────────────────────────────────────
  - bacphlip=0.9.6
  # sklearn: bacphlip 0.23.1 ister; 1.0.x uyarı verir ancak tahminler çalışır
  - scikit-learn>=1.0,<1.2

  # ── Anotasyon ────────────────────────────────────────────────────────────────
  - pharokka>=1.7.3
  - prokka=1.14.6

  # ── Viral taksonomi kümeleme ──────────────────────────────────────────────────
  - vcontact2=0.11.3
  - clusterone=1.0
  - networkx>=2.7,<3.0

  # ── Konak tahmini (vHULK için TF) ────────────────────────────────────────────
  - tensorflow>=2.9,<2.13   # Python 3.9 ile uyumlu; vHULK modellerini destekler
  - keras>=2.9,<2.13

  # ── Ortak biyoinformatik araçlar ──────────────────────────────────────────────
  - blast=2.15.0
  - diamond>=2.1
  - hmmer>=3.4
  - prodigal>=2.6.3
  - mash>=2.3
  - aragorn>=1.2
  - trnascan-se>=2.0
  - minced>=0.4

  # ── Python kütüphaneleri ──────────────────────────────────────────────────────
  - biopython>=1.79
  - numpy>=1.21,<2.0
  - pandas>=1.3,<2.0
  - scipy>=1.7
  - matplotlib-base>=3.5
  - pyhmmer>=0.10

  # ── pip kurulumları (bioconda'da bulunmayanlar) ───────────────────────────────
  - pip
  - pip:
      # vHULK: bioconda paketinde yok; GitHub/PyPI üzerinden
      - vhulk==1.0.0
